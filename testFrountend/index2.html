<!DOCTYPE html>
<html>
<head>
  <title>2FA Auth Tester</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 8px; width: 300px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    img { width: 200px; margin-top: 10px; }
    pre { background: #111; color: #0f0; padding: 10px; }
  </style>
</head>
<body>

<h2>🔐 2FA Auth Tester</h2>

<div class="box">
  <h3>1. Login</h3>
  <input id="email" placeholder="Email" />
  <input id="password" placeholder="Password" type="password" />
  <button onclick="login()">Login</button>
</div>

<div class="box">
  <h3>2. Enable 2FA (After Login Token)</h3>
  <button onclick="enable2FA()">Enable 2FA</button>
  <div id="qr"></div>
</div>

<div class="box">
  <h3>3. Verify 2FA Setup</h3>
  <input id="setupOtp" placeholder="Enter OTP from Auth App" />
  <button onclick="verifySetup()">Verify Setup</button>
</div>

<div class="box">
  <h3>4. 2FA Login Step</h3>
  <input id="userId" placeholder="User ID (from login response)" />
  <input id="otp" placeholder="OTP from Auth App" />
  <button onclick="verifyLogin()">Verify Login 2FA</button>
</div>

<h3>📦 Response</h3>
<pre id="output"></pre>

<script>
let token = "";
let userId = "";

// 1. LOGIN
async function login() {
  const res = await fetch("http://localhost:9001/api/v1/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);

  if (data.accessToken) {
    token = data.accessToken;
  }

  if (data.twoFactorRequired) {
    userId = data.userId;
    document.getElementById("userId").value = userId;
  }
}

// 2. ENABLE 2FA
async function enable2FA() {
  const res = await fetch("/api/v1/auth/2fa/enable", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);

  if (data.qrCodeUrl) {
    document.getElementById("qr").innerHTML =
      `<img src="${data.qrCodeUrl}" />`;
  }
}

// 3. VERIFY SETUP
async function verifySetup() {
  const res = await fetch("/api/v1/auth/2fa/verify-setup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      token: document.getElementById("setupOtp").value
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// 4. VERIFY LOGIN 2FA
async function verifyLogin() {
  const res = await fetch("/api/v1/auth/login/2fa", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      userId: document.getElementById("userId").value,
      token: document.getElementById("otp").value
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
